version: '3.8'

services:
  postgres_db:
    image: postgres:15-alpine
    container_name: todo_postgres
    environment:
      POSTGRES_DB: tododb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web_app:
    build: .
    container_name: todo_fastapi
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=postgres_db
      - DB_NAME=tododb
      - DB_USER=postgres
      - DB_PASSWORD=secret
    depends_on:
      - postgres_db

volumes:
  pgdata: